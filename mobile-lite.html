<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'self'">
<meta name="theme-color" content="#256f5b">
<meta name="robots" content="index,follow">
<title>HealthArchive Mobile Lite</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="mobile-lite.css?v=20260713-1">
</head>
<body>
<header class="lite-header">
  <a class="lite-brand" href="index.html" aria-label="HealthArchive 홈으로 이동">
    <img src="assets/logo-icon.png" alt=""><span>Health<b>Archive</b></span><em>Lite</em>
  </a>
  <a class="lite-full-link" href="index.html">전체 버전</a>
</header>

<main class="lite-main">
  <section class="lite-view active" id="lite-db" data-lite-view="db">
    <div class="lite-title"><span>Ingredient DB</span><h1>원료 검색</h1><p>개별인정·고시형 원료의 인정정보와 기능성을 조회합니다.</p></div>
    <div class="lite-filter">
      <input type="search" id="lite-db-search" placeholder="원료명, 업체, 기능성 검색" autocomplete="off">
      <select id="lite-db-category" aria-label="기능성 분류"><option value="all">전체 기능성</option></select>
    </div>
    <div class="lite-result-head"><strong id="lite-db-count">0건</strong><span>최근 인정순</span></div>
    <div class="lite-card-list" id="lite-db-list"></div>
    <button type="button" class="lite-more" id="lite-db-more" hidden>더 보기</button>
  </section>

  <section class="lite-view" id="lite-protocol" data-lite-view="protocol" hidden>
    <div class="lite-title"><span>Protocol</span><h1>기능성별 프로토콜</h1><p>대상자 모델, 평가변수, 전임상 모델과 작용기전을 확인합니다.</p></div>
    <input class="lite-search" type="search" id="lite-protocol-search" placeholder="기능성명 검색" autocomplete="off">
    <div class="lite-result-head"><strong id="lite-protocol-count">0건</strong><span>기능성 평가 기준</span></div>
    <div class="lite-protocol-detail" id="lite-protocol-detail" hidden></div>
    <div class="lite-protocol-list" id="lite-protocol-list"></div>
  </section>

  <section class="lite-view" id="lite-compare" data-lite-view="compare" hidden>
    <div class="lite-title"><span>Compare</span><h1>기능성별 원료 비교</h1><p>동일 기능성 원료를 최대 3개까지 선택하여 비교합니다.</p></div>
    <div class="lite-filter">
      <select id="lite-compare-category" aria-label="비교 기능성"><option value="">기능성 선택</option></select>
      <input type="search" id="lite-compare-search" placeholder="선택 기능성 내 원료 검색" autocomplete="off">
    </div>
    <div class="lite-result-head"><strong id="lite-compare-selected">0 / 3 선택</strong><button type="button" id="lite-compare-clear">초기화</button></div>
    <div class="lite-compare-options" id="lite-compare-options"></div>
    <div class="lite-compare-output" id="lite-compare-output"></div>
  </section>
</main>

<nav class="lite-bottom-nav" aria-label="Mobile Lite 메뉴">
  <button type="button" class="active" data-lite-tab="db"><span aria-hidden="true">⌕</span>원료 검색</button>
  <button type="button" data-lite-tab="protocol"><span aria-hidden="true">P</span>프로토콜</button>
  <button type="button" data-lite-tab="compare"><span aria-hidden="true">≍</span>원료 비교</button>
</nav>

<script src="data/ingredients.js?v=20260712-reports1"></script>
<script src="data/guidelines.js?v=20260629-glossary"></script>
<script src="data/biomarker_protocols.js?v=20260711-terms1"></script>
<script src="mobile-lite.js?v=20260713-1"></script>
</body>
</html>
