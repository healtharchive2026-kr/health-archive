name: Daily data update

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"
    - cron: "30 8 * * *"

permissions:
  contents: write

concurrency:
  group: daily-data-update
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scheduled update scripts
        run: |
          set +e
          scripts=(
            scripts/update_ingredients.py
            scripts/update_minutes.py
            scripts/update_products.py
            scripts/update_temp_approval.py
            scripts/update_news.py
            scripts/update_news_thinkfood.py
            scripts/update_news_mfds.py
            scripts/update_news_nutraingredients.py
            scripts/update_news_supplysidesj.py
            scripts/update_news_nutritioninsight.py
            scripts/update_news_sciencedaily.py
            scripts/update_news_yakup.py
            scripts/update_paper_reports.py
          )

          failed=0
          for script in "${scripts[@]}"; do
            echo "::group::${script}"
            python "$script"
            code=$?
            echo "::endgroup::"
            if [ "$code" -ne 0 ]; then
              echo "::warning::${script} failed with exit code ${code}"
              failed=1
            fi
          done

          if [ "$failed" -ne 0 ]; then
            echo "::warning::One or more update scripts failed. Successful script outputs will still be committed."
          fi

      - name: Commit updated data
        run: |
          git config user.name "healtharchive2026-kr"
          git config user.email "healtharchive2026@gmail.com"

          git add -f data/*.js data/*.json minutes-pdfs/*.txt
          git reset -- data/products_archive.json || true
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi

          git commit -m "Auto-update daily data"
          git push
